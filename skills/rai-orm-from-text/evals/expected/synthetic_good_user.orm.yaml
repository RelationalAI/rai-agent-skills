constraints:
  # External UCs for the three composite-identifier entities
  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: conference_has_name, role: name }
      - { fact_type: conference_has_year, role: year }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite identifier (name, year) for Conference. User stated the same conference name runs every year."
    provenance:
      csdp_step: 1
      dialogue_turn: 3
      user_quote: "We run 'DataConf' every year."
      halpin_reference: "ORM 2 Graphical Notation — External Uniqueness"

  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: track_in_conference, role: conference }
      - { fact_type: track_has_name, role: name }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite identifier (Conference, name) for Track."
    provenance:
      csdp_step: 1
      dialogue_turn: 3
      user_quote: "Track names repeat across conferences."

  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: talk_in_track, role: track }
      - { fact_type: talk_has_name, role: name }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite identifier (Track, name) for Talk."
    provenance:
      csdp_step: 1
      dialogue_turn: 3
      user_quote: "Talk names are unique within a track."

  # Value constraints from library + user-supplied
  - type: value
    object_type: integer
    role_ref: { fact_type: talk_at_position, role: position }
    range: { min: 1, min_inclusive: true }
    source: common-sense
    status: confirmed
    rationale: "Slot positions start at 1."
    provenance:
      library_entry: count-non-negative
      csdp_step: 6
      dialogue_turn: 9
      user_quote: "Slot 0 wouldn't exist."

  - type: value
    object_type: year
    range: { min: 1900, max: 2100, min_inclusive: true, max_inclusive: true }
    source: common-sense
    status: confirmed
    rationale: "Standard contemporary-year range; user kept broad bounds to allow historic conference cataloging."
    provenance:
      library_entry: year-range
      csdp_step: 6
      dialogue_turn: 9

  - type: textual
    expression: "Email must be a valid email address."
    formal_language: natural
    source: common-sense
    status: confirmed
    rationale: "Standard email-format validation from library."
    provenance:
      library_entry: email-format
      csdp_step: 6
      dialogue_turn: 9

  - type: value
    object_type: talk_type
    allowed: ['Regular', 'Keynote']
    source: user-supplied
    status: confirmed
    rationale: "User-confirmed enum; replaces the rejected Keynote subtype proposal."
    provenance:
      csdp_step: 6
      dialogue_turn: 10
      user_quote: "Use a TalkType value enum + a deontic policy for the keynote visibility rule."

  # User-supplied alethic frequency constraint
  - type: frequency
    scope: external
    role_refs:
      - { fact_type: talk_in_track, role: track }
      - { fact_type: track_in_conference, role: conference }
    bound: { max: 50 }
    source: user-supplied
    status: confirmed
    modality: alethic
    rationale: "Hard cap: at most 50 Talks per Conference (across all tracks)."
    provenance:
      csdp_step: 7
      dialogue_turn: 11
      user_quote: "Each conference shouldn't have more than 50 talks (we cap our schedule)."

  # Deontic policy: keynote visibility
  - type: textual
    expression: "Keynote talks should be listed first in the conference's display ordering."
    formal_language: natural
    source: user-supplied
    status: confirmed
    modality: deontic
    rationale: "Display-policy soft rule; not enforced structurally."
    provenance:
      csdp_step: 7
      dialogue_turn: 11
      user_quote: "Add the keynote-visibility rule. ... We don't enforce it strictly."

  # Deontic policy: talk duration
  - type: value
    object_type: integer
    role_ref: { fact_type: talk_has_duration, role: durationMinutes }
    range: { max: 60, max_inclusive: true }
    source: user-supplied
    status: confirmed
    modality: deontic
    rationale: "Talks should not exceed 60 minutes; panels may exceed by policy exception."
    provenance:
      csdp_step: 7
      dialogue_turn: 11
      user_quote: "Talks should not exceed 60 minutes (that's a soft policy — we sometimes allow longer panels)."

rejected_proposals:
  # LLM proposal rejected at Step 7b
  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: talk_given_by_speaker, role: speaker }
      - { fact_type: talk_in_track, role: track }
    source: llm-inferred
    rationale: "A Speaker can give at most 1 Talk per Track."
    rejection_reason: "Counter-example: speakers often give multiple talks in a single track (sessions, panels, etc.). User-rejected at Step 7b."
    rejected_at: "2026-05-14"
    provenance:
      llm_prompt_id: speaker-track-uniqueness-heuristic
      reviewed_at_step_6d: true
      csdp_step: 7
      dialogue_turn: 11
      user_quote: "Reject — speakers often give multiple talks in a single track."

  # Subtype proposal rejected at Step 6 due to Halpin role-based criterion
  - type: subtype-partition
    supertype: talk
    subtypes: ["keynote_talk (proposed)", "regular_talk (proposed)"]
    source: user-supplied
    rejection_reason: "Halpin role-based criterion: Keynote vs Regular Talk has no role difference (both have position, speaker, duration). The distinction is attribute-based — replaced with TalkType value enum + deontic display policy."
    rejected_at: "2026-05-14"
    provenance:
      csdp_step: 6
      dialogue_turn: 10
      user_quote: "Both have a position. Both have a speaker. Keynotes have a special 'is_keynote' flag. So... no role differences, just a flag."
