# =============================================================================
# Reference solution for evals/fixtures/tpc_h/schema.sql
#
# Drafted under the Phase 1.3 authorship plan. See the synthetic.orm.yaml header
# for the full review-protocol context.
#
# TPC-H characteristics:
#   - 8 tables; all have PKs (added via local-modification ALTER TABLE statements
#     per the TPC-H spec — see fixtures/tpc_h/schema.sql).
#   - Composite PK on PARTSUPP (PS_PARTKEY, PS_SUPPKEY) → objectified entity.
#   - Composite PK on LINEITEM (L_ORDERKEY, L_LINENUMBER) → objectified entity.
#   - Composite FK from LINEITEM to PARTSUPP (L_PARTKEY, L_SUPPKEY).
#   - No self-FKs, no CHECK constraints, no enum-flavored VARCHARs.
#   - Tests pure mechanical lift on a clean industry-standard schema.
#   - Should produce ZERO antipattern flags — the clean baseline benchmark.
# =============================================================================

version: 1

source:
