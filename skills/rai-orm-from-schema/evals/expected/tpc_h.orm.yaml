# =============================================================================
# Top-level constraints
# =============================================================================
constraints:
  # ---- External UCs from composite PKs ----
  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: part_supp_for_part, role: part }
      - { fact_type: part_supp_for_supplier, role: supplier }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite PK (PS_PARTKEY, PS_SUPPKEY) on PUBLIC.PARTSUPP."
    provenance:
      table: PUBLIC.PARTSUPP
      columns: [PS_PARTKEY, PS_SUPPKEY]
      constraint_type: PK
      halpin_reference: "ORM 2 Graphical Notation — External Uniqueness"

  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: line_item_for_orders, role: orders }
      - { fact_type: line_item_line_number, role: lineNumber }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite PK (L_ORDERKEY, L_LINENUMBER) on PUBLIC.LINEITEM."
    provenance:
      table: PUBLIC.LINEITEM
      columns: [L_ORDERKEY, L_LINENUMBER]
      constraint_type: PK
      halpin_reference: "ORM 2 Graphical Notation — External Uniqueness"

  # ---- Common-sense library proposals ----
  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: part_has_retail_price, role: retailPrice }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Retail prices are non-negative — Money library entry."
    provenance: { library_entry: money-positive }

  - type: value
    object_type: integer
    role_ref: { fact_type: part_has_size, role: size }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Part sizes are non-negative."
    provenance: { library_entry: count-non-negative }

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: supplier_acct_balance, role: acctBal }
    # Note: account balances CAN be negative (overdrafts). No range proposed.
    source: common-sense
    status: rejected
    rejection_reason: "Account balances may legitimately be negative."
    rejected_at: "2026-05-04"

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: customer_acct_balance, role: acctBal }
    source: common-sense
    status: rejected
    rejection_reason: "Account balances may legitimately be negative."
    rejected_at: "2026-05-04"

  - type: value
    object_type: integer
    role_ref: { fact_type: part_supp_avail_qty, role: availQty }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Available quantities are non-negative — Count library entry."
    provenance: { library_entry: count-non-negative }

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: part_supp_supply_cost, role: supplyCost }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: money-positive }

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: orders_total_price, role: totalPrice }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: money-positive }

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: line_item_quantity, role: quantity }
    range: { min: 0, min_inclusive: false }                # quantities are positive
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: count-non-negative }

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: line_item_extended_price, role: extendedPrice }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: money-positive }

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: line_item_discount, role: discount }
    range: { min: 0, max: 1, min_inclusive: true, max_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Discount is a 0..1 fractional value (TPC-H convention)."
    provenance: { library_entry: discount-fraction }

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: line_item_tax, role: tax }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: count-non-negative }

  # ---- Common-sense temporal constraints (LineItem dates) ----
  - type: value-comparison
    operator: "<="
    role_a: { fact_type: line_item_ship_date, role: shipDate }
    role_b: { fact_type: line_item_receipt_date, role: receiptDate }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Shipments are received no earlier than they are shipped."
    provenance:
      library_entry: temporal-lifecycle-shipped-delivered
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints"

  - type: value-comparison
    operator: "<="
    role_a: { fact_type: orders_order_date, role: orderDate }
    role_b: { fact_type: line_item_ship_date, role: shipDate }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Line items ship no earlier than their order's order-date."
    provenance:
      library_entry: temporal-lifecycle-placed-shipped

rejected_proposals:
  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: supplier_acct_balance, role: acctBal }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    rationale: "Money library entry would propose non-negative."
    rejection_reason: "Account balances may legitimately be negative (overdrafts)."
    rejected_at: "2026-05-04"

  - type: value
    object_type: decimal_15_2
    role_ref: { fact_type: customer_acct_balance, role: acctBal }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    rationale: "Money library entry would propose non-negative."
    rejection_reason: "Account balances may legitimately be negative."
    rejected_at: "2026-05-04"
