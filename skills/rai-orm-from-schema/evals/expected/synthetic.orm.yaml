fact_types:
  # ---- ProductCategory ----
  - id: product_category_has_name
    reading: "{ProductCategory} has name {String}"
    roles: [{ object_type: product_category, role_name: category }, { object_type: string, role_name: name }]
    constraints:
      - type: uniqueness
        roles: [category]
        source: explicit
        status: confirmed
        provenance:
          table: PUBLIC.PRODUCT_CATEGORY
          column: NAME
          constraint_type: PK_INDUCED
          halpin_reference: "ORM 2 Graphical Notation — Internal UC (Property single-valued on category role)"
      - type: mandatory
        role: category
        source: explicit
        status: confirmed
        provenance:
          table: PUBLIC.PRODUCT_CATEGORY
          column: NAME
          nullable: false
          halpin_reference: "ORM 2 Graphical Notation — Mandatory Role Constraints (NOT NULL → mandatory)"

  # Self-referential — both roles on ProductCategory
  - id: product_category_has_parent
    reading: "{ProductCategory} has parent {ProductCategory}"
    roles: [{ object_type: product_category, role_name: child }, { object_type: product_category, role_name: parent }]
    constraints:
      - type: uniqueness
        roles: [child]
        source: explicit
        status: confirmed
        provenance:
          table: PUBLIC.PRODUCT_CATEGORY
          column: PARENT_CATEGORY_ID
          constraint_type: FK
          halpin_reference: "ORM 2 Graphical Notation — Internal UC (functional self-reference: each child has at most one parent)"
      # Note: PARENT_CATEGORY_ID is nullable → no mandatory on the child role.
      - type: ring
        variant: acyclic
        source: common-sense
        status: proposed
        modality: alethic
        rationale: "Self-referential 'parent' relation matches the library entry — category hierarchies are universally acyclic (no category is its own ancestor)."
        provenance:
          library_entry: ring-parent-of
          matched_pattern: "self-referential binary fact type with parent/child role names"
          assumptions: ["Universal hierarchical-parent semantics; no cycles by structural assumption."]
          halpin_reference: "ORM 2 Graphical Notation — Ring Constraints (acyclic glyph)"
      - type: ring
        variant: asymmetric
        source: common-sense
        status: proposed
        modality: alethic
        rationale: "Parenthood is asymmetric — if A is parent of B, B is not parent of A."
        provenance:
          library_entry: ring-parent-of
          halpin_reference: "ORM 2 Graphical Notation — Ring Constraints (asymmetric glyph)"
      - type: ring
        variant: irreflexive
        source: common-sense
        status: proposed
        modality: alethic
        rationale: "Parenthood is irreflexive — no category is its own parent."
        provenance:
          library_entry: ring-parent-of
          halpin_reference: "ORM 2 Graphical Notation — Ring Constraints (irreflexive glyph)"

