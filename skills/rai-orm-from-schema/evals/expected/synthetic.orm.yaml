# =============================================================================
# Reference solution for evals/fixtures/synthetic/schema.sql
#
# Drafted under the Phase 1.3 authorship plan; constraints carry provenance
# with `halpin_reference` (where the ORM 2 Graphical Notation justifies the
# structural choice), `library_entry` (where the constraint comes from the
# typed library; entry ids match `references/constraint-inference.md`), or
# `sample_query` (where the constraint comes from probing the sample data).
#
# Example Halpin reference resolution:
#   halpin_reference: "ORM 2 Graphical Notation — Internal Uniqueness Constraints"
#   ↳ resolves to: Halpin, "ORM 2 Graphical Notation" (2010), §3 (Internal UCs);
#                  a bar over role boxes; double bar marks the preferred internal UC.
#
# Schema characteristics exercised here (per notes/phase1-synthetic-schema-spec.md):
#   - All 5 source values populated.
#   - Antipatterns: denormalized address (Customer + Warehouse), encoded enum
#     (6 columns), ambiguous junction (2 cases), TYPE-column subtype.
#   - Common-sense ring: PRODUCT_CATEGORY parent (acyclic). INVENTORY_TRANSFER
#     from ≠ to is emitted as a `value-comparison` constraint (operator `!=`),
#     per representation-format.md — not a ring constraint, since the from-
#     and to-warehouse are separate fact types rather than a single ring.
#   - Common-sense temporal: ORDERS placed/shipped/delivered.
#   - LLM-inferred subset: RETURN_REQUEST → DELIVERED orders.
#   - Deontic constraint: promotion codes should be applied before their expiry
#     (`order_promotion.applied_at <= promotion_code.valid_to`, modality=deontic).
# =============================================================================

