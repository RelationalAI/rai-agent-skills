    roles: [{ object_type: promotion_code, role_name: code }, { object_type: date, role_name: validFrom }]
    constraints:
      - type: uniqueness
        roles: [code]
        source: explicit
        status: confirmed
      - { type: mandatory, role: code, source: explicit, status: confirmed }

  - id: promotion_code_valid_to
    reading: "{PromotionCode} valid to {Date}"
    roles: [{ object_type: promotion_code, role_name: code }, { object_type: date, role_name: validTo }]
    constraints:
      - type: uniqueness
        roles: [code]
        source: explicit
        status: confirmed
      - type: mandatory
        role: code
        source: explicit
        status: confirmed

  # ---- OrderPromotion (objectified, externally identified) ----
  - id: order_promotion_for_orders
    reading: "{OrderPromotion} for {Orders}"
    roles: [{ object_type: order_promotion, role_name: orderPromotion }, { object_type: orders, role_name: orders }]
    constraints:
      - { type: mandatory, role: orderPromotion, source: explicit, status: confirmed }

  - id: order_promotion_uses_code
    reading: "{OrderPromotion} uses {PromotionCode}"
    roles: [{ object_type: order_promotion, role_name: orderPromotion }, { object_type: promotion_code, role_name: code }]
    constraints:
      - { type: mandatory, role: orderPromotion, source: explicit, status: confirmed }

  - id: order_promotion_applied_at
    reading: "{OrderPromotion} applied at {DateTime}"
    roles: [{ object_type: order_promotion, role_name: orderPromotion }, { object_type: datetime, role_name: appliedAt }]
    constraints:
      - type: uniqueness
        roles: [orderPromotion]
        source: explicit
        status: confirmed
      - type: mandatory
        role: orderPromotion
        source: explicit
        status: confirmed

# =============================================================================
# Top-level constraints
# =============================================================================
constraints:
  # ---- External UCs from composite PKs / objectifications ----
  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: order_item_for_orders, role: orders }
      - { fact_type: order_item_line_no, role: lineNo }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite PK (ORDER_ID, LINE_NO) on PUBLIC.ORDER_ITEM — OrderItem's preferred reference scheme."
    provenance:
      table: PUBLIC.ORDER_ITEM
      columns: [ORDER_ID, LINE_NO]
      constraint_type: PK
      halpin_reference: "ORM 2 Graphical Notation — External Uniqueness (composite PK → external UC across binary fact types)"

  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: inventory_for_warehouse, role: warehouse }
      - { fact_type: inventory_for_product, role: product }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite PK (WAREHOUSE_ID, PRODUCT_ID) on PUBLIC.INVENTORY."
    provenance:
      table: PUBLIC.INVENTORY
      columns: [WAREHOUSE_ID, PRODUCT_ID]
      constraint_type: PK
      halpin_reference: "ORM 2 Graphical Notation — External Uniqueness"

  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: order_promotion_for_orders, role: orders }
      - { fact_type: order_promotion_uses_code, role: code }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite PK (ORDER_ID, PROMOTION_CODE) on PUBLIC.ORDER_PROMOTION."
    provenance:
      table: PUBLIC.ORDER_PROMOTION
      columns: [ORDER_ID, PROMOTION_CODE]
      constraint_type: PK
      halpin_reference: "ORM 2 Graphical Notation — External Uniqueness"

  # ---- Value enumerations from sample probing (encoded-enum antipatterns) ----
  - type: value
    object_type: customer_tier
    allowed: ['BRONZE', 'SILVER', 'GOLD']
    source: sample
    status: confirmed
    rationale: "Sample distinct values from PUBLIC.CUSTOMER.TIER. Confirmed at Step 9b."
    provenance:
      sample_query: "SELECT DISTINCT TIER FROM PUBLIC.CUSTOMER WHERE TIER IS NOT NULL LIMIT 21"
      sample_size: 10
      saturation: true
      observed_values: ['BRONZE', 'SILVER', 'GOLD']
      halpin_reference: "ORM 2 Graphical Notation — Object Type Value Constraints (enumeration in braces)"

  - type: value
    object_type: product_type
    allowed: ['PHYSICAL', 'DIGITAL', 'SUBSCRIPTION']
    source: sample
    status: confirmed
    rationale: "Sample distinct values from PUBLIC.PRODUCT.TYPE."
    provenance:
      sample_query: "SELECT DISTINCT TYPE FROM PUBLIC.PRODUCT WHERE TYPE IS NOT NULL LIMIT 21"
      sample_size: 15
      saturation: true
      observed_values: ['PHYSICAL', 'DIGITAL', 'SUBSCRIPTION']
      halpin_reference: "ORM 2 Graphical Notation — Object Type Value Constraints"

  - type: value
    object_type: order_status
    allowed: ['PENDING', 'PAID', 'SHIPPED', 'DELIVERED', 'CANCELLED']
    source: sample
    status: confirmed
    rationale: "Sample distinct values from PUBLIC.ORDERS.STATUS."
    provenance:
      sample_query: "SELECT DISTINCT STATUS FROM PUBLIC.ORDERS WHERE STATUS IS NOT NULL LIMIT 21"
      sample_size: 20
      saturation: true
      observed_values: ['PENDING', 'PAID', 'SHIPPED', 'DELIVERED', 'CANCELLED']

  - type: value
    object_type: shipment_event_type
    allowed: ['PICKED_UP', 'IN_TRANSIT', 'OUT_FOR_DELIVERY', 'DELIVERED', 'EXCEPTION']
    source: sample
    status: confirmed
    rationale: "Sample distinct values from PUBLIC.SHIPMENT_EVENT.EVENT_TYPE."
    provenance:
      sample_query: "SELECT DISTINCT EVENT_TYPE FROM PUBLIC.SHIPMENT_EVENT WHERE EVENT_TYPE IS NOT NULL LIMIT 21"
      sample_size: 25
      saturation: true
      observed_values: ['PICKED_UP', 'IN_TRANSIT', 'OUT_FOR_DELIVERY', 'DELIVERED', 'EXCEPTION']

  - type: value
    object_type: return_reason
    allowed: ['DEFECTIVE', 'CHANGED_MIND', 'WRONG_ITEM', 'NOT_AS_DESCRIBED', 'DAMAGED']
    source: sample
    status: confirmed
    rationale: "Sample distinct values from PUBLIC.RETURN_REQUEST.REASON."
    provenance:
      sample_query: "SELECT DISTINCT REASON FROM PUBLIC.RETURN_REQUEST WHERE REASON IS NOT NULL LIMIT 21"
      sample_size: 5
      saturation: true
      observed_values: ['DEFECTIVE', 'CHANGED_MIND', 'WRONG_ITEM', 'NOT_AS_DESCRIBED', 'DAMAGED']

  - type: value
    object_type: payment_method
    allowed: ['CARD', 'BANK', 'PAYPAL', 'GIFT']
    source: sample
    status: confirmed
    rationale: "Sample distinct values from PUBLIC.PAYMENT.METHOD."
    provenance:
      sample_query: "SELECT DISTINCT METHOD FROM PUBLIC.PAYMENT WHERE METHOD IS NOT NULL LIMIT 21"
      sample_size: 15
      saturation: true
      observed_values: ['CARD', 'BANK', 'PAYPAL', 'GIFT']

  # ---- Numeric ranges from sample probing ----
  - type: value
    object_type: integer
    role_ref: { fact_type: inventory_quantity_on_hand, role: quantityOnHand }
    range: { min: 0, min_inclusive: true }
    source: sample
    status: proposed
    modality: alethic
    rationale: "Sample observed range; quantity-on-hand is non-negative by domain convention."
    provenance:
      sample_query: "SELECT MIN(QUANTITY_ON_HAND), MAX(QUANTITY_ON_HAND) FROM PUBLIC.INVENTORY"
      sample_size: 14
      observed_range: { min: 120, max: 1800 }
      library_entry: count-non-negative

  - type: value
    object_type: money_10_2
    role_ref: { fact_type: product_has_unit_price, role: unitPrice }
    range: { min: 0, min_inclusive: false }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Unit prices are positive — money library entry combined with 'price' name pattern."
    provenance:
      library_entry: money-positive
      assumptions: ["Single-currency assumption."]

  - type: value
    object_type: integer
    role_ref: { fact_type: order_item_quantity, role: quantity }
    range: { min: 1, min_inclusive: true }
    source: sample
    status: proposed
    modality: alethic
    rationale: "Order-line quantities start at 1 — sample observed; 'quantity' library entry confirms non-zero."
    provenance:
      sample_query: "SELECT MIN(QUANTITY), MAX(QUANTITY) FROM PUBLIC.ORDER_ITEM"
      sample_size: 35
      observed_range: { min: 1, max: 5 }
      library_entry: count-non-negative

  - type: value
    object_type: discount_4_3
    role_ref: { fact_type: order_item_discount, role: discount }
    range: { min: 0, max: 1, min_inclusive: true, max_inclusive: true }
    source: sample
    status: proposed
    modality: alethic
    rationale: "Sample shows discount in [0, 1]; standard 0..1 fractional discount convention."
    provenance:
      sample_query: "SELECT MIN(DISCOUNT), MAX(DISCOUNT) FROM PUBLIC.ORDER_ITEM"
      sample_size: 35
      observed_range: { min: 0.000, max: 0.300 }

  - type: value
    object_type: percent_5_2
    role_ref: { fact_type: promotion_code_discount_pct, role: discountPct }
    range: { min: 0, max: 100, min_inclusive: false, max_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Percentage scale 0–100; promotion_code's discount must be positive and ≤ 100."
    provenance:
      library_entry: percent-0-100

  - type: value
    object_type: money_10_2
    role_ref: { fact_type: return_refund_amount, role: refundAmount }
    range: { min: 0, min_inclusive: false }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Refund amounts are positive."
    provenance:
      library_entry: money-positive

  - type: value
    object_type: money_10_2
    role_ref: { fact_type: payment_amount, role: amount }
    range: { min: 0, min_inclusive: false }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Payment amounts are positive."
    provenance:
      library_entry: money-positive

  # ---- Common-sense "from ≠ to" on InventoryTransfer (value-comparison, not ring) ----
  # Modelled as value-comparison rather than ring constraint because the from-warehouse
  # and to-warehouse are separate fact types (not a single self-referential binary).
  # See references/constraint-reference.md "Value-comparison" — the != operator is a
  # v0.1 extension covering "must-be-distinct" cases on same-type role pairs.
  - type: value-comparison
    operator: "!="
    role_a: { fact_type: inventory_transfer_from, role: fromWarehouse }
    role_b: { fact_type: inventory_transfer_to, role: toWarehouse }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Transfers between two warehouses presuppose distinct from/to — same FK target on both roles + 'transfer' semantic signals distinct endpoints."
    provenance:
      library_entry: ring-transfer-from-to
      matched_pattern: "two roles on same object type with role names from/to and verb 'transfer'"
      assumptions: ["Self-loop (from = to) is meaningless for stock transfers."]
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints (≠ operator; v0.1 extension)"

  # ---- Common-sense temporal constraints on ORDERS lifecycle ----
  - type: value-comparison
    operator: "<="
    role_a: { fact_type: orders_placed_at, role: placedAt }
    role_b: { fact_type: orders_shipped_at, role: shippedAt }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Orders are shipped no earlier than placed — universal lifecycle ordering on status timestamps."
    provenance:
      library_entry: temporal-lifecycle-placed-shipped
      assumptions: ["Status timestamps follow strict happen-before semantics."]
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints (≤)"

  - type: value-comparison
    operator: "<="
    role_a: { fact_type: orders_shipped_at, role: shippedAt }
    role_b: { fact_type: orders_delivered_at, role: deliveredAt }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Orders are delivered no earlier than shipped — universal lifecycle ordering."
    provenance:
      library_entry: temporal-lifecycle-shipped-delivered
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints (≤)"

  - type: value-comparison
    operator: "<="
    role_a: { fact_type: promotion_code_valid_from, role: validFrom }
    role_b: { fact_type: promotion_code_valid_to, role: validTo }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Validity intervals: from-date precedes to-date."
    provenance:
      library_entry: temporal-validity-interval
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints"

  # ---- LLM-inferred subset: Returns reference DELIVERED orders ----
  - type: subset
    subset_role_seq:
      - { fact_type: return_for_order_item, role: orderItem }
    superset_role_seq:
      - { fact_type: order_item_for_orders, role: orderItem }
    where_predicate: "Orders.status = 'DELIVERED'"
    source: llm-inferred
    status: proposed
    modality: alethic
    rationale: "Returns presuppose receipt — only delivered orders can have items returned. Returning a non-delivered item is conceptually invalid."
    provenance:
      llm_prompt_id: returns-must-reference-delivered-orders
      rationale_world_fact: "Returns presuppose physical receipt of goods; only DELIVERED orders have receipts."
      reviewed_at_step_6d: true
      halpin_reference: "ORM 2 Graphical Notation — Set-Comparison Constraints (subset arrow)"

  # ---- Subtype partition for Product (TYPE-column subtype split) ----
  - type: subtype-partition
    supertype: product
    subtypes: [physical_product, digital_product, subscription_product]
    exclusive: true
    exhaustive: true
    source: common-sense
    status: proposed
    rationale: "PUBLIC.PRODUCT.TYPE is single-valued (exclusive) and NOT NULL with three side tables correlating to its three values (exhaustive)."
    provenance:
      origin: type-column-detection
      table: PUBLIC.PRODUCT
      column: TYPE
      side_tables: [PUBLIC.PHYSICAL_PRODUCT_DETAILS, PUBLIC.DIGITAL_PRODUCT_DETAILS, PUBLIC.SUBSCRIPTION_PRODUCT_DETAILS]
      halpin_reference: "ORM 2 Graphical Notation — Subtyping (circled X for exclusion + circled dot for totality = partition)"

  # ---- Deontic constraint: promotion-code expiry (should rule, not enforced) ----
  # Modelled as a value-comparison between the applied_at and the promotion's valid_to;
  # `modality: deontic` so PyRel translation emits as `# DEONTIC NOTE:` rather than `model.require`.
  - type: value-comparison
    operator: "<="
    role_a: { fact_type: order_promotion_applied_at, role: appliedAt }
    role_b: { fact_type: promotion_code_valid_to, role: validTo }
    source: user-supplied
    status: confirmed
    modality: deontic
    rationale: "Promotion codes should be applied before their expiry date. Soft business rule (deontic) — not enforced at the schema level; violations are policy issues, not data-integrity errors."
    provenance:
      added_at_step: 9d
      user_note: "Added during Step 9d as a policy 'should' rule; labelled deontic at Step 9e."
      halpin_reference: "ORM 2 Graphical Notation — Modality (alethic vs deontic; deontic typically drawn in blue with 'o' for obligatory)"

rejected_proposals: []

