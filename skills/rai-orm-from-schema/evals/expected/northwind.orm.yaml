# Top-level constraints
# =============================================================================
constraints:
  # ---- External UC for OrderDetail (composite PK identifies the objectification) ----
  - type: uniqueness
    scope: external
    role_refs:
      - { fact_type: order_detail_for_orders, role: orders }
      - { fact_type: order_detail_for_product, role: product }
    preferred: true
    source: explicit
    status: confirmed
    rationale: "Composite PK (order_id, product_id) on PUBLIC.order_details — OrderDetail's preferred reference scheme."
    provenance:
      table: PUBLIC.order_details
      columns: [order_id, product_id]
      constraint_type: PK
      halpin_reference: "ORM 2 Graphical Notation — External Uniqueness"

  # ---- Common-sense library proposals ----

  # Customer.email: Northwind doesn't have a discrete email column — phone/fax only.
  # No email-uniqueness proposal applies.

  # Numeric ranges (sample-derived, but no live data probe at the YAML layer; common-sense library suffices)
  - type: value
    object_type: float
    role_ref: { fact_type: orders_freight, role: freight }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Freight charges are non-negative — Money library entry."
    provenance: { library_entry: money-positive, assumptions: ["Single-currency."] }

  - type: value
    object_type: float
    role_ref: { fact_type: product_unit_price, role: unitPrice }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Product unit prices are non-negative — Money library entry."
    provenance: { library_entry: money-positive }

  - type: value
    object_type: integer
    role_ref: { fact_type: product_units_in_stock, role: unitsInStock }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Stock counts are non-negative — Count library entry."
    provenance: { library_entry: count-non-negative }

  - type: value
    object_type: integer
    role_ref: { fact_type: product_units_on_order, role: unitsOnOrder }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: count-non-negative }

  - type: value
    object_type: integer
    role_ref: { fact_type: product_reorder_level, role: reorderLevel }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: count-non-negative }

  - type: value
    object_type: float
    role_ref: { fact_type: order_detail_unit_price, role: unitPrice }
    range: { min: 0, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    provenance: { library_entry: money-positive }

  - type: value
    object_type: integer
    role_ref: { fact_type: order_detail_quantity, role: quantity }
    range: { min: 1, min_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Order-line quantities start at 1."
    provenance: { library_entry: count-non-negative }

  - type: value
    object_type: float
    role_ref: { fact_type: order_detail_discount, role: discount }
    range: { min: 0, max: 1, min_inclusive: true, max_inclusive: true }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Discount is a 0..1 fractional value."
    provenance: { library_entry: discount-fraction }

  # ---- Common-sense temporal constraints on Orders lifecycle ----
  - type: value-comparison
    operator: "<="
    role_a: { fact_type: orders_order_date, role: orderDate }
    role_b: { fact_type: orders_required_date, role: requiredDate }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Required-by date is no earlier than order date."
    provenance:
      library_entry: temporal-validity-interval
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints (≤)"

  - type: value-comparison
    operator: "<="
    role_a: { fact_type: orders_order_date, role: orderDate }
    role_b: { fact_type: orders_shipped_date, role: shippedDate }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Orders are shipped no earlier than placed."
    provenance:
      library_entry: temporal-lifecycle-placed-shipped
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints (≤)"

  # ---- Common-sense: employee birth_date <= hire_date ----
  - type: value-comparison
    operator: "<="
    role_a: { fact_type: employee_birth_date, role: birthDate }
    role_b: { fact_type: employee_hire_date, role: hireDate }
    source: common-sense
    status: proposed
    modality: alethic
    rationale: "Employees are born before they are hired."
    provenance:
      library_entry: temporal-lifecycle-birth-hire
      halpin_reference: "ORM 2 Graphical Notation — Value-Comparison Constraints"

  # ---- LLM-inferred: orders.shipped_date populated only when employee+shipper assigned ----
  # Plausible domain inference but speculative; flagged for user review.
  - type: subset
    subset_role_seq:
      - { fact_type: orders_shipped_date, role: orders }
    superset_role_seq:
      - { fact_type: orders_shipped_via, role: orders }
    source: llm-inferred
    status: proposed
    modality: alethic
    rationale: "An order's shipped_date is set only when a shipper has been assigned (Step 6c, surfaced at Step 6d for review)."
    provenance:
      llm_prompt_id: shipped-date-requires-shipper
      rationale_world_fact: "Shipping requires a carrier; without a Shipper, an order cannot be marked shipped."
      reviewed_at_step_6d: true
      halpin_reference: "ORM 2 Graphical Notation — Set-Comparison Constraints (subset)"

rejected_proposals: []
