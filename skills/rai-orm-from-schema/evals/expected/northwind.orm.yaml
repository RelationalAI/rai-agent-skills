# =============================================================================
# Reference solution for evals/fixtures/northwind/schema.sql
#
# Drafted under the Phase 1.3 authorship plan. See the synthetic.orm.yaml header
# for the full review-protocol context.
#
# Northwind characteristics:
#   - 14 tables; all have PKs.
#   - Denormalized address on `customers`, `employees`, and `orders.ship_*`.
#   - Self-FK ring on `employees.reports_to` (manager hierarchy).
#   - Three junction tables: `order_details` (composite PK + extras → objectified),
#     `employee_territories` (composite all-FK no extras → pure m:n),
#     `customer_customer_demo` (composite all-FK no extras → pure m:n).
#   - `products.discontinued` is INTEGER but values restricted to {0, 1} →
#     boolean-encoded antipattern candidate.
#   - No CHECK constraints, no encoded-enum VARCHARs, no TYPE-column subtypes.
# =============================================================================

version: 1

source:
