  # Self-referential: employee reports to manager (both roles on Employee)
  - id: employee_reports_to_manager
    reading: "{Employee} reports to {Employee}"
    roles: [{ object_type: employee, role_name: employee }, { object_type: employee, role_name: manager }]
    constraints:
      - type: uniqueness
        roles: [employee]
        source: explicit
        status: confirmed
        provenance:
          table: PUBLIC.employees
          column: reports_to
          constraint_type: FK
          halpin_reference: "ORM 2 Graphical Notation — Internal UC (functional self-reference: each employee has at most one manager)"
      # reports_to is nullable → no mandatory.
      - type: ring
        variant: acyclic
        source: common-sense
        status: proposed
        modality: alethic
        rationale: "Self-referential 'reports_to'/'manages' relation. Universal management convention: hierarchies are acyclic."
        provenance:
          library_entry: ring-reports-to
          matched_pattern: "self-referential binary fact type with reports_to/manages role names"
          assumptions: ["Hierarchical management; circular reporting disallowed."]
          halpin_reference: "ORM 2 Graphical Notation — Ring Constraints (acyclic glyph)"
      - type: ring
        variant: asymmetric
        source: common-sense
        status: proposed
        modality: alethic
        provenance: { library_entry: ring-reports-to }
      - type: ring
        variant: irreflexive
        source: common-sense
        status: proposed
        modality: alethic
